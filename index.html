<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>池增历 | 数据分析师</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ================= 基础变量与重置 ================= */
        :root {
            --sidebar-width: 260px;
            --primary: #2c3e50;       /* 深蓝灰主色 */
            --accent: #3498db;        /* 亮蓝强调色 */
            --bg-body: #f4f6f9;       /* 极淡灰背景 */
            --bg-card: #ffffff;       /* 纯白卡片 */
            --text-main: #333333;
            --text-sub: #666666;
            --border-light: #eef0f4;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; transition: var(--transition); }
        ul { list-style: none; }

        /* ================= 左侧固定导航栏 ================= */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-card);
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            z-index: 100;
            overflow-y: auto;
        }

        /* 侧边栏个人信息区 */
        .profile-area { text-align: center; margin-bottom: 40px; }
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-light);
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .name { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .role { font-size: 14px; color: var(--accent); font-weight: 500; letter-spacing: 1px; }

        /* 侧边栏导航菜单 */
        .nav-menu { flex: 1; }
        .nav-item { margin-bottom: 8px; }
        .nav-link {
            display: flex; align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-sub);
            font-weight: 500;
        }
        .nav-link i { width: 25px; font-size: 16px; margin-right: 10px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background-color: rgba(52, 152, 219, 0.1);
            color: var(--accent);
        }

        /* 侧边栏底部社交/联系 */
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-light); }
        .contact-info { font-size: 13px; color: var(--text-sub); line-height: 2; }
        .contact-info i { width: 20px; color: var(--accent); }

        /* ================= 右侧内容区 ================= */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 0;
            overflow-x: hidden;
        }

        section {
            padding: 80px 60px;
            min-height: 100vh; /* 每个板块至少一屏高 */
            border-bottom: 1px solid var(--border-light);
        }
        
        /* 标题样式 */
        .section-title {
            font-size: 28px; font-weight: 700; color: var(--primary);
            margin-bottom: 40px; position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: ''; position: absolute; left: 0; bottom: -10px;
            width: 40px; height: 4px; background: var(--accent); border-radius: 2px;
        }

        /* --- 1. 首页 (Hero) --- */
        #home {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            padding-left: 100px; /* 视觉居中一点 */
        }
        .hero-greeting { font-size: 18px; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
        .hero-name { font-size: 56px; font-weight: 800; color: var(--primary); line-height: 1.2; margin-bottom: 20px; }
        .hero-desc { font-size: 20px; color: var(--text-sub); max-width: 600px; line-height: 1.8; margin-bottom: 40px; }
        .btn-primary {
            display: inline-block; padding: 12px 30px;
            background: var(--accent); color: white; border-radius: 30px;
            font-weight: 600; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4); }

        /* --- 2. 个人简介 (About) --- */
        .about-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .about-text p { font-size: 16px; color: var(--text-sub); line-height: 1.8; margin-bottom: 20px; }
        .skills-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .skill-tag {
            padding: 6px 15px; background: #eaf2f8; color: var(--accent);
            border-radius: 20px; font-size: 14px; font-weight: 500;
        }
        
        /* 优势卡片 */
        .advantage-card {
            background: var(--bg-card); padding: 30px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 4px solid var(--accent);
        }
        .advantage-card h3 { font-size: 18px; margin-bottom: 15px; color: var(--primary); }
        .advantage-list li {
            position: relative; padding-left: 20px; margin-bottom: 10px;
            font-size: 14px; color: var(--text-sub); line-height: 1.6;
        }
        .advantage-list li::before {
            content: '✔'; position: absolute; left: 0; top: 0; color: var(--success); font-size: 12px;
        }

        /* --- 3. 案例展示 (Portfolio) --- */
        .portfolio-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;
        }
        .project-card {
            background: var(--bg-card); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition); cursor: pointer;
            border: 1px solid transparent;
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .card-header {
            padding: 20px 25px; border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-size: 18px; font-weight: 700; color: var(--primary); }
        .card-badge {
            font-size: 12px; padding: 4px 10px; border-radius: 12px;
            background: #fff3cd; color: #856404; font-weight: 600;
        }
        
        .card-body { padding: 25px; }
        .card-desc { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px; }
        
        .tech-stack-mini { display: flex; gap: 8px; margin-bottom: 20px; }
        .tech-mini { font-size: 12px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }

        .card-actions { display: flex; gap: 10px; }
        .btn-sm {
            flex: 1; text-align: center; padding: 8px 0; border-radius: 6px;
            font-size: 13px; font-weight: 600; border: 1px solid var(--border-light);
        }
        .btn-view { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-view:hover { background: #1a252f; }
        .btn-code { color: var(--text-sub); }
        .btn-code:hover { background: #f8f9fa; color: var(--primary); }

        /* --- 4. 证书展示 (Certificates) --- */
        .cert-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px;
        }
        .cert-item {
            background: var(--bg-card); padding: 15px; border-radius: 8px;
            box-shadow: var(--shadow); text-align: center; transition: var(--transition);
            cursor: pointer;
        }
        .cert-item:hover { transform: scale(1.05); }
        .cert-img-box {
            width: 100%; aspect-ratio: 4/3; background: #eee; border-radius: 4px;
            margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .cert-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .cert-name { font-size: 14px; font-weight: 600; color: var(--primary); }

        /* ================= Lightbox (图片弹窗) ================= */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-content { max-width: 90%; max-height: 90%; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .lightbox-close {
            position: absolute; top: 30px; right: 40px;
            color: white; font-size: 40px; cursor: pointer; transition: 0.3s;
        }
        .lightbox-close:hover { color: var(--accent); }

        /* ================= 响应式适配 ================= */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; position: relative;
                flex-direction: row; align-items: center; padding: 15px 20px;
                border-right: none; border-bottom: 1px solid var(--border-light);
            }
            .profile-area { margin: 0; display: flex; align-items: center; text-align: left; }
            .avatar { width: 50px; height: 50px; margin: 0 15px 0 0; }
            .nav-menu { display: flex; gap: 10px; margin-left: auto; }
            .nav-link span { display: none; } /* 手机端隐藏文字只显示图标 */
            .sidebar-footer { display: none; }
            
            .main-content { margin-left: 0; }
            section { padding: 50px 20px; }
            #home { padding-left: 20px; align-items: center; text-align: center; }
            .about-grid { grid-template-columns: 1fr; }
            .hero-name { font-size: 36px; }
        }
    </style>
</head>
