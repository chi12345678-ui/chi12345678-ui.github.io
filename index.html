<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暖光动态墙</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410;
    --card: #2a2118;
    --accent: #d4a056;
    --text: #f0e6d8;
    --muted: #a89880;
    --border: #3d3024;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    text-align: center;
    color: var(--accent);
    font-size: 1.6rem;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  /* ========== 证书栏样式 ========== */
  .cert-section {
    margin-bottom: 24px;
  }
  .cert-section h2 {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-align: center;
  }
  .cert-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .cert-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .cert-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .cert-card img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .cert-card .cert-name {
    padding: 8px 10px;
    font-size: 0.82rem;
    color: var(--text);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* 证书大图预览遮罩 */
  #cert-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1001;
    cursor: zoom-out;
  }
  #cert-overlay img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(212,160,86,0.3);
  }

  /* 密码遮罩 */
  #lock-screen {
    position: fixed; inset:0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    flex-direction: column; gap: 16px;
  }
  #lock-screen input {
    padding: 12px 20px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 1.1rem;
    text-align: center;
    outline: none;
    width: 240px;
  }
  #lock-screen input:focus { border-color: var(--accent); }
  #lock-screen button {
    padding: 10px 32px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #1a1410;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }

  /* 发布区 */
  .compose {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .compose textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 1rem;
    resize: none;
    outline: none;
    min-height: 80px;
    line-height: 1.6;
  }
  .compose-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .char-count { font-size: 0.8rem; color: var(--muted); }
  .btn-send {
    padding: 8px 24px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #1a1410;
    font-weight: bold;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
  }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 动态列表 */
  .post-list { display: flex; flex-direction: column; gap: 12px; }
  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .post-content { font-size: 1rem; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
  .post-meta { margin-top: 10px; font-size: 0.78rem; color: var(--muted); display:flex; gap:8px; flex-wrap:wrap;}
  .tag { background: var(--border); padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; }
  .empty { text-align:center; color:var(--muted); padding:40px 0; font-size:0.95rem; }
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#c0392b; color:#fff; padding:10px 24px; border-radius:10px;
    font-size:0.9rem; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:1000;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- 密码锁屏 -->
<div id="lock-screen">
  <h1 style="margin-bottom:8px;">🔒 请输入访问密码</h1>
  <input type="password" id="pwd-input" placeholder="输入密码后回车" autofocus>
  <button onclick="unlock()">进入</button>
</div>

<!-- 证书大图预览 -->
<div id="cert-overlay" onclick="this.style.display='none'">
  <img id="cert-overlay-img" src="" alt="证书预览">
</div>

<div class="container" id="app" style="display:none;">
  <h1>✨ 暖光动态墙</h1>

  <!-- ====== 证书展示栏 ====== -->
  <div class="cert-section">
    <h2>📜 我的证书</h2>
    <div class="cert-grid" id="cert-grid"></div>
  </div>

  <div class="compose">
    <textarea id="content-input" placeholder="写下此刻的想法…（最多1000字）" maxlength="1000"></textarea>
    <div class="compose-footer">
      <span class="char-count"><span id="char-num">0</span>/1000</span>
      <button class="btn-send" id="send-btn" disabled>发布</button>
    </div>
  </div>

  <div class="post-list" id="post-list">
    <div class="empty">加载中…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================
// 👇 请替换为你自己的 Supabase 项目信息
const SUPABASE_URL = 'https://bqdhqnviozvqljigzys.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxZGhxbnZpb3p2cWxqaWd6eXMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NzgxNTI2NSwiZXhwIjoyMDYzMzkwODY1fQ.xTjGvZkPwJKvXlOlMqJGOkhOmJgCm3OoJjGqsQXZpEw';
const ACCESS_PASSWORD = '12345678'; // 👈 修改访问密码
// ============================================

// ====== 证书配置（文件名已确认为 jpg）======
const certificates = [
  { name: 'CDA数据分析师',   img: './certs/CDA-LEVEL1.jpg' },
  { name: '英语六级',        img: './certs/CET6.jpg' },
  { name: '计算机二级',      img: './certs/office_level2.jpg' },
  { name: '普通话水平测试',  img: './certs/putonghua.jpg' },
];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- 渲染证书栏 ---
function renderCertificates() {
  const grid = document.getElementById('cert-grid');
  grid.innerHTML = certificates.map(c => `
    <div class="cert-card">
      <img src="${c.img}" alt="${c.name}" 
           onclick="previewCert('${c.img}')" 
           onerror="this.style.opacity='0.3';this.alt='图片加载失败'">
      <div class="cert-name">${c.name}</div>
    </div>
  `).join('');
}

// 证书大图预览
function previewCert(src) {
  const overlay = document.getElementById('cert-overlay');
  document.getElementById('cert-overlay-img').src = src;
  overlay.style.display = 'flex';
}

// --- 密码验证 ---
function unlock() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ACCESS_PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    showToast('密码错误');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

// --- Toast ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- 主逻辑 ---
async function initApp() {
  renderCertificates();
  await loadPosts();
  subscribeRealtime();
}

// 加载历史动态
async function loadPosts() {
  const { data, error } = await sb
    .from('posts')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(50);

  if (error) { showToast('加载失败: ' + error.message); return; }
  renderPosts(data);
}

// 渲染列表
function renderPosts(posts) {
  const list = document.getElementById('post-list');
  if (!posts || posts.length === 0) {
    list.innerHTML = '<div class="empty">还没有动态，来发布第一条吧 ✨</div>';
    return;
  }
  list.innerHTML = posts.map(p => postHTML(p)).join('');
}

function postHTML(p) {
  const time = new Date(p.created_at).toLocaleString('zh-CN', {
    month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'
  });
  const tags = (p.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');
  return `
    <div class="post-card">
      <div class="post-content">${escapeHtml(p.content)}</div>
      <div class="post-meta">
        <span>🕐 ${time}</span>
        ${tags}
      </div>
    </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 实时订阅
function subscribeRealtime() {
  sb.channel('posts-realtime')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'posts' },
      (payload) => {
        const list = document.getElementById('post-list');
        const empty = list.querySelector('.empty');
        if (empty) empty.remove();
        list.insertAdjacentHTML('afterbegin', postHTML(payload.new));
      }
    )
    .subscribe();
}

// --- 发布 ---
const input = document.getElementById('content-input');
const sendBtn = document.getElementById('send-btn');
const charNum = document.getElementById('char-num');

input.addEventListener('input', () => {
  const len = input.value.trim().length;
  charNum.textContent = input.value.length;
  sendBtn.disabled = len === 0 || len > 1000;
});

sendBtn.addEventListener('click', async () => {
  const content = input.value.trim();
  if (!content) return;
  sendBtn.disabled = true;
  sendBtn.textContent = '发布中…';

  const { error } = await sb.from('posts').insert({ content, tags: [] });

  sendBtn.textContent = '发布';
  if (error) {
    showToast('发布失败: ' + error.message);
    sendBtn.disabled = false;
  } else {
    input.value = '';
    charNum.textContent = '0';
    sendBtn.disabled = true;
  }
});
</script>
</body>
</html>
